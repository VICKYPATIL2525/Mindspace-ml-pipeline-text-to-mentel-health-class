<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindSpace — Well-being Screening</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🧠 MindSpace</h1>
            <p class="subtitle">AI-powered well-being screening assistant</p>
            <p class="disclaimer">⚠️ This is <strong>not</strong> a medical diagnosis system.</p>
        </header>

        <!-- Chat area -->
        <div id="chat" class="chat-area" aria-live="polite"></div>

        <!-- Controls -->
        <div class="controls">
            <button id="startBtn" class="btn btn-primary">Start Screening</button>
            <button id="recordBtn" class="btn btn-record" disabled>🎙️ Hold to Speak</button>
            <select id="langSelect" class="lang-select">
                <option value="en-IN" selected>English (India)</option>
                <option value="hi-IN">Hindi</option>
                <option value="ta-IN">Tamil</option>
                <option value="te-IN">Telugu</option>
                <option value="kn-IN">Kannada</option>
                <option value="ml-IN">Malayalam</option>
                <option value="bn-IN">Bengali</option>
                <option value="mr-IN">Marathi</option>
            </select>
        </div>

        <!-- Session info (debug) -->
        <details class="debug-panel">
            <summary>Session Info</summary>
            <pre id="sessionInfo">No active session</pre>
        </details>
    </div>

    <script src="app.js"></script>
</body>
</html>
